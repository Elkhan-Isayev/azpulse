<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzPulse — Azərbaycan Açıq Məlumat Paneli (opendata.az)</title>
  <meta name="description" content="AzPulse — Azərbaycanın açıq məlumatları (opendata.az) üzərində canlı panel. Ölkənin real vaxt göstəriciləri və bazar siqnalları. Backend yoxdur." />
  <meta property="og:title" content="AzPulse — Azerbaijan Live Data Dashboard" />
  <meta property="og:description" content="Real-time country metrics & market signals from opendata.az — 769 official datasets, queried live in the browser." />
  <link rel="preconnect" href="https://admin.opendata.az" />
  <link rel="preconnect" href="https://data-storage.opendata.az" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">AZ</span>
      <div>
        <h1 data-i18n="app.title">AzPulse</h1>
        <p class="tagline" data-i18n-html="app.tagline"></p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="lang" role="group" aria-label="Language">
        <button class="lang-btn" data-lang="az">AZ</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <div class="status">
        <span id="conn-dot" class="dot dot--pending"></span>
        <span id="conn-text" data-i18n="status.connecting"></span>
        <span id="refreshed" class="refreshed"></span>
      </div>
    </div>
  </header>

  <main>
    <!-- KPI cards -->
    <section class="kpis" id="kpis">
      <div class="kpi"><div class="kpi-val" id="kpi-datasets">—</div><div class="kpi-label" data-i18n="kpi.datasets"></div></div>
      <div class="kpi"><div class="kpi-val" id="kpi-categories">—</div><div class="kpi-label" data-i18n="kpi.categories"></div></div>
      <div class="kpi"><div class="kpi-val" id="kpi-orgs">—</div><div class="kpi-label" data-i18n="kpi.orgs"></div></div>
      <div class="kpi"><div class="kpi-val" id="kpi-csv">—</div><div class="kpi-label" data-i18n="kpi.csv"></div></div>
    </section>

    <div class="grid">
      <!-- Categories chart -->
      <section class="panel panel--wide">
        <div class="panel-head">
          <h2 data-i18n="cat.title"></h2>
          <p class="muted" data-i18n="cat.sub"></p>
        </div>
        <div class="chart-box"><canvas id="categoryChart"></canvas></div>
      </section>

      <!-- Market signal -->
      <section class="panel panel--signal">
        <div class="panel-head">
          <h2 data-i18n="signal.title"></h2>
          <p class="muted" data-i18n="signal.sub"></p>
        </div>
        <div class="signal-num" id="signal-num">—</div>
        <div class="signal-cap" data-i18n="signal.caption"></div>
        <button class="btn" data-cat="economics" data-i18n="signal.btn"></button>
      </section>
    </div>

    <!-- Economy insight: where is demand growing -->
    <section class="panel" id="econ-panel">
      <div class="panel-head">
        <h2 data-i18n="econ.title"></h2>
        <p class="muted" id="econ-desc"></p>
      </div>
      <div id="econ-takeaway" class="takeaway"></div>
      <div class="chart-box" style="height:460px"><canvas id="econChart"></canvas></div>
      <p class="dnote" data-i18n="econ.dnote"></p>
    </section>

    <!-- Browser -->
    <section class="panel">
      <div class="panel-head browser-head">
        <div>
          <h2 data-i18n="exp.title"></h2>
          <p class="muted" data-i18n="exp.sub"></p>
        </div>
        <input id="search" class="search" type="search" data-i18n-ph="exp.search" />
      </div>
      <div class="chips" id="chips"></div>
      <div class="results" id="results"></div>
      <div class="results-foot" id="results-foot"></div>
    </section>
  </main>

  <!-- Dataset detail drawer -->
  <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
  <aside class="drawer" id="drawer" hidden aria-label="Dataset detail">
    <button class="drawer-close" id="drawer-close" aria-label="Close">×</button>
    <div id="drawer-body"></div>
  </aside>

  <footer class="footer">
    <p data-i18n-html="footer.1"></p>
    <p class="muted" data-i18n="footer.2"></p>
    <p class="disclaimer" data-i18n="footer.3"></p>
  </footer>
</body>
</html>
